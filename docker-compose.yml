version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: securebank-db
    environment:
      POSTGRES_DB: securebank
      POSTGRES_USER: securebank
      POSTGRES_PASSWORD: securebank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securebank"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: securebank-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/securebank
      SPRING_DATASOURCE_USERNAME: securebank
      SPRING_DATASOURCE_PASSWORD: securebank
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"

volumes:
  postgres_data: